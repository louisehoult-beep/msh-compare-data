name: Daily compare-tab + supplier-index refresh
on:
  schedule:
    - cron: "15 3 * * *"   # daily 03:15 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and merge (append-only)
        run: python3 fetch_issues.py
      - name: Rebuild supplier index (curated seed + medical awards + recalls)
        run: python3 build_supplier_index.py
      - name: Commit if changed
        run: |
          git config user.name "compare-refresh-bot"
          git config user.email "actions@github.com"
          git add data state
          git diff --cached --quiet || git commit -m "Daily refresh $(date -u +%F)"
          git push
      - name: Phone alert if new items (ntfy)
        run: |
          N=$(python3 -c "import json;print(len(json.load(open('state/last_run.json'))['added']))" 2>/dev/null || echo 0)
          if [ "$N" -gt 0 ]; then
            curl -s -H "Title: Medical Sales Hub - Compare tab" -H "Priority: default" -H "Tags: mag" \
              -d "$N new item(s) auto-detected on the Compare tab. Claude will draft the rep lines by 07:10; check them on your dashboard or the Med Sales Tools page." \
              ntfy.sh/eth-hub-lou-4437
          fi
      - name: Phone alert on failure (ntfy)
        if: failure()
        run: |
          curl -s -H "Title: Medical Sales Hub - pipeline FAILED" -H "Priority: high" -H "Tags: warning" \
            -d "The daily compare-tab refresh failed. Check github.com/louisehoult-beep/msh-compare-data/actions" \
            ntfy.sh/eth-hub-lou-4437
